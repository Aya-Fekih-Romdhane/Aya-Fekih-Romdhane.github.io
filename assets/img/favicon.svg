<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Hexagon background -->
  <polygon points="32,2 58,17 58,47 32,62 6,47 6,17" fill="url(#bg)"/>
  <polygon points="32,2 58,17 58,47 32,62 6,47 6,17" fill="url(#shine)"/>
  <!-- Border -->
  <polygon points="32,2 58,17 58,47 32,62 6,47 6,17" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Letters AF -->
  <text x="32" y="40" font-family="Raleway, Arial, sans-serif" font-size="22" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="-1">AF</text>
</svg>
